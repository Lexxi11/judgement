site_name: Alexanders Wissensdatenbank
site_description: Persönliche Wissensdatenbank für Informatik, Netzwerktechnik und Programmierung
site_url: https://wissen.gerichtert.com

# Der bisherige Einzeldatei-Editor bleibt als Legacy-Quelle im Repository.
# Ohne diesen Ausschluss würde er mit docs/editor.md um /editor/ kollidieren.
exclude_docs: |
  editor/index.html

theme:
  name: material
  language: de

  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.indexes
    - content.code.copy
    - search.suggest
    - search.highlight

  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      toggle:
        icon: material/brightness-7
        name: Dunkles Design verwenden

    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      toggle:
        icon: material/brightness-4
        name: Helles Design verwenden

plugins:
  - search:
      lang: de
  - meta
  - tags

markdown_extensions:
  - admonition
  - attr_list
  - footnotes
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true

extra_css:
  - https://uicdn.toast.com/editor/3.2.2/toastui-editor.min.css
  - https://uicdn.toast.com/editor/3.2.2/theme/toastui-editor-dark.min.css
  - assets/stylesheets/markdown-editor.css

extra_javascript:
  - https://uicdn.toast.com/editor/3.2.2/toastui-editor-all.min.js
  - assets/javascripts/mermaid.mjs
  - assets/javascripts/markdown-editor.js

nav:

  - Startseite: index.md

  - Editor: editor.md

  - Netzwerktechnik:
      - Übersicht: netzwerktechnik/index.md
      - OSI-Modell: netzwerktechnik/osi-modell.md
      - Switching: netzwerktechnik/switching.md
      - VLAN: netzwerktechnik/vlan.md
      - Spanning Tree: netzwerktechnik/spanning-tree.md

  - Betriebssysteme:
      - Übersicht: betriebssysteme/index.md
      - Linux: betriebssysteme/linux.md
      - Dateisystem: betriebssysteme/dateisystem.md
      - Berechtigungen: betriebssysteme/berechtigungen.md

  - Programmierung:
      - Übersicht: programmierung/index.md
      - Grundlagen: programmierung/grundlagen.md
      - C#: programmierung/csharp.md
      - Objektorientierung: programmierung/objektorientierung.md

  - Datenbanken:
      - Übersicht: datenbanken/index.md
      - Grundlagen: datenbanken/grundlagen.md
      - Normalisierung: datenbanken/normalisierung.md
      - SQL: datenbanken/sql.md

  - Mathematik und Logik:
      - Übersicht: mathematik-und-logik/index.md
      - Binärsystem: mathematik-und-logik/binaersystem.md
      - Boolesche Algebra: mathematik-und-logik/boolesche-algebra.md

  - Schlagwörter: tags.md
